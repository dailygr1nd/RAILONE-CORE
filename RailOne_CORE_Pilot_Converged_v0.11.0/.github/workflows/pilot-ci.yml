name: RailOne pilot gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: railone_test
          POSTGRES_USER: railone_test
          POSTGRES_PASSWORD: railone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U railone_test -d railone_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      RAILONE_TEST_DATABASE_URL: postgresql://railone_test:railone_test@localhost:5432/railone_test
      RAILONE_ALLOW_TEST_SCHEMA_RESET: "1"
      RAILONE_REQUIRE_LIVE_POSTGRES: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install pilot dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[pilot]"

      - name: Verify repository convergence
        run: python scripts/check_repository_convergence.py

      - name: Reject committed secrets
        run: python scripts/check_no_secrets.py

      - name: Compile source
        run: python -m compileall -q -f railone_* tests

      - name: Run complete pilot suite
        run: python run_tests.py
